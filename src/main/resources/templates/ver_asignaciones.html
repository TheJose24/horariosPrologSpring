<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignaciones de Horarios</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900">

<header class="bg-red-900 text-white py-5 shadow-lg">
    <div class="container mx-auto flex justify-between items-center px-6">
        <h1 class="text-2xl font-bold tracking-wide">Asignaciones de Horarios</h1>
        <a href="/" class="bg-black hover:bg-red-700 transition text-white px-5 py-2 rounded-md shadow">
            Volver al Inicio
        </a>
    </div>
</header>

<div class="container mx-auto px-4 py-10">
    <div th:if="${asignaciones != null and !asignaciones.empty}">
        <div th:each="entry : ${asignaciones}" class="mb-8 bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-xl font-bold text-red-800 mb-4" th:text="${entry.key.nombre}">Nombre del Curso</h2>
            <p class="text-gray-600 mb-4">Código: <span th:text="${entry.key.codigo}">Código</span></p>

            <div class="overflow-x-auto">
                <table class="w-full table-auto text-center">
                    <thead>
                    <tr class="bg-gray-100">
                        <th class="py-2 px-4">Docente</th>
                        <th class="py-2 px-4">Día</th>
                        <th class="py-2 px-4">Hora Inicio</th>
                        <th class="py-2 px-4">Hora Fin</th>
                        <th class="py-2 px-4">Modalidad</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="asignacion : ${entry.value}" class="border-b hover:bg-gray-50">
                        <td class="py-2 px-4" th:text="${asignacion.nombreDocente}">Docente</td>
                        <td class="py-2 px-4 capitalize" th:text="${asignacion.dia}">Día</td>
                        <td class="py-2 px-4" th:text="${asignacion.horaInicio}">Hora Inicio</td>
                        <td class="py-2 px-4" th:text="${asignacion.horaFin}">Hora Fin</td>
                        <td class="py-2 px-4" th:text="${asignacion.modalidad}">Modalidad</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:if="${asignaciones == null or asignaciones.empty}" class="bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded">
        <p>No hay asignaciones disponibles. Genere horarios primero.</p>
    </div>
</div>

</body>
</html>
